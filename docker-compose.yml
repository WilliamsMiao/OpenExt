version: "3.9"

services:
  openclaw:
    image: alpine/openclaw:main
    container_name: openclaw
    ports:
      - "18789:18789"
    volumes:
      - .:/workspace
    environment:
      - OPENCLAW_HOME=/workspace
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=openclaw
      - POSTGRES_USER=openclaw
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openclaw_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openclaw_net

  postgres:
    image: postgres:15-alpine
    container_name: openclaw_postgres
    environment:
      - POSTGRES_DB=openclaw
      - POSTGRES_USER=openclaw
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openclaw_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - openclaw_net

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - openclaw_net

  dashboard:
    build:
      context: ./ui/dashboard
      dockerfile: Dockerfile
    container_name: openclaw_dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WORKSPACE_PATH=/app/workspace
      # OpenClaw 绑定在容器内 loopback(127.0.0.1)，同网络容器无法直连；
      # 经宿主机端口转发才能到达。Docker Desktop(Mac/Win) 用 host.docker.internal；
      # Linux 宿主请改为 host-gateway 并在 extra_hosts 中声明。
      - OPENCLAW_API=http://host.docker.internal:18789
      - OPENCLAW_CONTAINER=openclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - openclaw
    networks:
      - openclaw_net

  telegram-bridge:
    build:
      context: ./ui/telegram-bridge
      dockerfile: Dockerfile
    container_name: openclaw_telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENCLAW_API=http://host.docker.internal:18789
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - openclaw
    networks:
      - openclaw_net
    profiles:
      - telegram

volumes:
  postgres_data:
  redis_data:

networks:
  openclaw_net:
    driver: bridge
